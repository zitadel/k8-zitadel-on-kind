# Self-signed issuer for creating the trust anchor CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: linkerd-self-signed-issuer
spec:
  selfSigned: {}
---
# Linkerd trust anchor certificate (root CA) - in cert-manager namespace for trust-manager access
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-trust-anchor
  namespace: cert-manager
spec:
  isCA: true
  commonName: root.linkerd.cluster.local
  secretName: linkerd-trust-anchor
  duration: 87600h # 10 years
  renewBefore: 8760h # 1 year
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - cert sign
    - crl sign
    - server auth
    - client auth
  issuerRef:
    name: linkerd-self-signed-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# ClusterIssuer that uses the trust anchor to sign identity certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: linkerd-trust-anchor-issuer
spec:
  ca:
    secretName: linkerd-trust-anchor
---
# Linkerd identity issuer certificate (intermediate CA)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-identity-issuer
  namespace: linkerd
spec:
  isCA: true
  commonName: identity.linkerd.cluster.local
  secretName: linkerd-identity-issuer
  duration: 8760h # 365 days
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - cert sign
    - crl sign
    - server auth
    - client auth
  issuerRef:
    name: linkerd-trust-anchor-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Bundle to sync trust anchor CA to ConfigMap for Linkerd
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: linkerd-identity-trust-roots
spec:
  sources:
    - secret:
        name: linkerd-trust-anchor
        key: ca.crt
  target:
    configMap:
      key: ca-bundle.crt
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: linkerd
---
# Bundle to sync default CAs + Linkerd trust anchor to ConfigMap for Zitadel.
# This allows both the Zitadel (Go) and Login (Node.js) containers to trust
# internal certificates issued by cert-manager without losing trust in public
# CAs. The useDefaultCAs source includes the Mozilla CA bundle so that
# SSL_CERT_FILE does not overwrite the system root CA store.
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: zitadel-ca-bundle
spec:
  sources:
    - useDefaultCAs: true
    - secret:
        name: linkerd-trust-anchor
        key: ca.crt
  target:
    configMap:
      key: ca-certificates.crt
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: zitadel
